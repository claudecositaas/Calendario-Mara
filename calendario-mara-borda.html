<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Editorial · Mara Borda</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #FDF8E1;
    font-family: 'Inter', sans-serif;
    color: #2C2C2A;
    min-height: 100vh;
    padding: 0;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  .hdr {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 12px;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-monogram {
    width: 46px; height: 46px; border-radius: 50%;
    background: #2C2C2A;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700; color: #FDF8E1;
    flex-shrink: 0;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700; color: #2C2C2A; line-height: 1.1;
  }

  .brand-sub {
    font-size: 11px; color: #888780;
    letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px;
  }

  .month-nav { display: flex; align-items: center; gap: 12px; }

  .nav-btn {
    width: 34px; height: 34px; border-radius: 8px;
    border: 0.5px solid #D3D1C7; background: transparent;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: #5F5E5A; font-size: 18px; transition: all 0.15s;
  }
  .nav-btn:hover { background: #2C2C2A; color: #FDF8E1; border-color: #2C2C2A; }

  .month-label {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: #2C2C2A;
    min-width: 160px; text-align: center;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: white; border-radius: 10px;
    border: 0.5px solid #D3D1C7;
    padding: 12px 14px; cursor: pointer;
    transition: all 0.15s; position: relative;
  }
  .stat-card:hover { border-color: #888780; transform: translateY(-1px); }
  .stat-card.active { border: 1.5px solid #2C2C2A; }

  .stat-dot { width: 9px; height: 9px; border-radius: 50%; margin-bottom: 8px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
  .stat-lbl { font-size: 12px; color: #888780; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-check { position: absolute; top: 10px; right: 12px; font-size: 16px; color: #2C2C2A; opacity: 0; }
  .stat-card.active .stat-check { opacity: 1; }

  .cal-grid-wrap {
    background: white; border-radius: 12px;
    border: 0.5px solid #D3D1C7; overflow: hidden; margin-bottom: 1.5rem;
  }

  .cal-dow {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: #F1EFE8;
  }
  .cal-dow-cell {
    font-size: 11px; font-weight: 600; text-align: center;
    padding: 10px 4px; color: #888780;
    text-transform: uppercase; letter-spacing: 0.07em;
  }

  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }

  .cal-day {
    min-height: 90px; padding: 8px 8px 6px;
    border-right: 0.5px solid #D3D1C7;
    border-bottom: 0.5px solid #D3D1C7;
    cursor: pointer; transition: background 0.1s;
    vertical-align: top;
  }
  .cal-day:nth-child(7n) { border-right: none; }
  .cal-day.other-month { background: #F8F6EC; }
  .cal-day.today { background: #FFFBF0; }
  .cal-day:hover { background: #FFFDF5; }
  .cal-day.selected { background: #FDF4CC; }

  .day-num {
    font-size: 14px; font-weight: 600; color: #2C2C2A;
    margin-bottom: 5px; display: inline-block;
  }
  .cal-day.today .day-num {
    background: #2C2C2A; color: #FDF8E1; border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .cal-day.other-month .day-num { color: #B4B2A9; }

  .day-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .day-dot { height: 6px; border-radius: 3px; flex: 1; min-width: 6px; max-width: 24px; }

  .day-chip {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 100%; display: block; line-height: 1.5;
  }

  .panel {
    background: white; border-radius: 12px;
    border: 0.5px solid #D3D1C7; overflow: hidden; margin-bottom: 1.5rem;
  }

  .panel-hdr {
    background: #F1EFE8; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px; font-weight: 700; color: #2C2C2A;
  }
  .panel-close {
    background: transparent; border: none; cursor: pointer;
    color: #888780; font-size: 20px; padding: 0; line-height: 1;
    display: flex; align-items: center;
  }
  .panel-close:hover { color: #2C2C2A; }

  .flow-hdr-row {
    display: grid; grid-template-columns: 200px 1fr 1fr 1fr 120px;
    background: #F8F6EC; border-bottom: 0.5px solid #D3D1C7;
  }
  .flow-hdr-cell {
    padding: 8px 14px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: #888780;
    border-right: 0.5px solid #D3D1C7;
  }
  .flow-hdr-cell:last-child { border-right: none; }

  .flow-row {
    display: grid; grid-template-columns: 200px 1fr 1fr 1fr 120px;
    border-bottom: 0.5px solid #D3D1C7; align-items: stretch;
    transition: background 0.1s;
  }
  .flow-row:last-child { border-bottom: none; }
  .flow-row:hover { background: #FFFDF5; }

  .flow-cell {
    padding: 13px 14px; font-size: 12px;
    border-right: 0.5px solid #D3D1C7;
    display: flex; flex-direction: column; gap: 4px;
  }
  .flow-cell:last-child { border-right: none; }

  .fc-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px; font-weight: 700; color: #2C2C2A; line-height: 1.2;
  }

  .plat-pill {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 500; width: fit-content; margin-top: 3px;
  }
  .p-ig { background: #FAEEDA; color: #854F0B; }
  .p-fb { background: #E6F1FB; color: #185FA5; }
  .p-li { background: #E6F1FB; color: #0C447C; }
  .p-tk { background: #EEEDFE; color: #3C3489; }
  .p-yt { background: #FCEBEB; color: #A32D2D; }
  .p-tw { background: #E1F5EE; color: #085041; }

  .flow-step { display: flex; flex-direction: column; gap: 2px; }
  .step-lbl { font-size: 10px; color: #888780; text-transform: uppercase; letter-spacing: 0.05em; }
  .step-val { font-size: 13px; font-weight: 700; color: #2C2C2A; font-family: 'Playfair Display', serif; }
  .step-sub { font-size: 11px; color: #5F5E5A; }
  .arr { color: #B4B2A9; font-size: 14px; }

  .st-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; width: fit-content; margin-top: 4px;
  }
  .s-pend { background: #F1EFE8; color: #5F5E5A; }
  .s-edit { background: #FAEEDA; color: #854F0B; }
  .s-apro { background: #EAF3DE; color: #3B6D11; }
  .s-publ { background: #EEEDFE; color: #3C3489; }

  .notes-txt { font-size: 11px; color: #5F5E5A; line-height: 1.4; }

  .add-row {
    padding: 12px 16px; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: #888780; cursor: pointer;
    border-top: 0.5px dashed #D3D1C7; transition: background 0.15s;
  }
  .add-row:hover { background: #FFFDF5; color: #2C2C2A; }

  .empty-day {
    padding: 28px; text-align: center;
    font-size: 14px; color: #B4B2A9;
  }
  .empty-day i { font-size: 28px; display: block; margin-bottom: 8px; opacity: 0.4; }

  .modal-wrap {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(44,44,42,0.35);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-wrap.open { display: flex; }
  .modal {
    background: #FDF8E1; border-radius: 14px;
    border: 0.5px solid #D3D1C7; padding: 1.75rem;
    width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: #2C2C2A; margin-bottom: 1.25rem;
  }
  .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .fg-full { grid-column: 1 / -1; }
  .flbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888780; display: block; margin-bottom: 4px; }
  .finp {
    font-family: 'Inter', sans-serif; font-size: 13px;
    padding: 8px 10px; border-radius: 8px;
    border: 0.5px solid #D3D1C7; background: white; color: #2C2C2A;
    outline: none; width: 100%; transition: border-color 0.15s;
  }
  .finp:focus { border-color: #888780; }
  .mact { display: flex; gap: 10px; margin-top: 1.25rem; justify-content: flex-end; }
  .btn-c {
    padding: 9px 20px; border-radius: 8px;
    border: 0.5px solid #D3D1C7; background: transparent;
    font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; color: #5F5E5A;
  }
  .btn-c:hover { border-color: #888780; color: #2C2C2A; }
  .btn-s {
    padding: 9px 20px; border-radius: 8px; border: none;
    background: #2C2C2A; color: #FDF8E1;
    font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .btn-s:hover { background: #444441; }

  .footer {
    text-align: center; font-size: 12px; color: #B4B2A9;
    margin-top: 3rem; padding-top: 1.5rem;
    border-top: 0.5px solid #D3D1C7;
    font-family: 'Playfair Display', serif;
  }

  @media (max-width: 700px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .flow-hdr-row, .flow-row { grid-template-columns: 1fr; }
    .flow-hdr-cell { display: none; }
    .flow-cell { border-right: none; border-bottom: 0.5px solid #D3D1C7; }
    .cal-day { min-height: 60px; }
    .brand-name { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="page">

  <div class="hdr">
    <div class="brand">
      <div class="brand-monogram">MB</div>
      <div>
        <div class="brand-name">Mara Borda</div>
        <div class="brand-sub">Calendario Editorial</div>
      </div>
    </div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)" aria-label="Mes anterior"><i class="ti ti-chevron-left"></i></button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)" aria-label="Mes siguiente"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card" id="sc-pend" onclick="toggleFilter('Pendiente','sc-pend')">
      <div class="stat-dot" style="background:#B4B2A9"></div>
      <div class="stat-num" id="sn-pend" style="color:#5F5E5A">0</div>
      <div class="stat-lbl">Pendiente</div>
      <i class="ti ti-check stat-check" aria-hidden="true"></i>
    </div>
    <div class="stat-card" id="sc-edit" onclick="toggleFilter('En edición','sc-edit')">
      <div class="stat-dot" style="background:#EF9F27"></div>
      <div class="stat-num" id="sn-edit" style="color:#854F0B">0</div>
      <div class="stat-lbl">En edición</div>
      <i class="ti ti-check stat-check" aria-hidden="true"></i>
    </div>
    <div class="stat-card" id="sc-apro" onclick="toggleFilter('Aprobado','sc-apro')">
      <div class="stat-dot" style="background:#639922"></div>
      <div class="stat-num" id="sn-apro" style="color:#3B6D11">0</div>
      <div class="stat-lbl">Aprobado</div>
      <i class="ti ti-check stat-check" aria-hidden="true"></i>
    </div>
    <div class="stat-card" id="sc-publ" onclick="toggleFilter('Publicado','sc-publ')">
      <div class="stat-dot" style="background:#7F77DD"></div>
      <div class="stat-num" id="sn-publ" style="color:#3C3489">0</div>
      <div class="stat-lbl">Publicado</div>
      <i class="ti ti-check stat-check" aria-hidden="true"></i>
    </div>
  </div>

  <div class="cal-grid-wrap">
    <div class="cal-dow">
      <div class="cal-dow-cell">Lun</div><div class="cal-dow-cell">Mar</div>
      <div class="cal-dow-cell">Mié</div><div class="cal-dow-cell">Jue</div>
      <div class="cal-dow-cell">Vie</div><div class="cal-dow-cell">Sáb</div>
      <div class="cal-dow-cell">Dom</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>

  <div class="panel" id="flowPanel" style="display:none">
    <div class="panel-hdr">
      <div class="panel-title" id="flowPanelTitle">Flujo de trabajo</div>
      <button class="panel-close" onclick="closePanel()" aria-label="Cerrar"><i class="ti ti-x"></i></button>
    </div>
    <div class="flow-hdr-row">
      <div class="flow-hdr-cell">Campaña</div>
      <div class="flow-hdr-cell">Entrega → Edición</div>
      <div class="flow-hdr-cell">Aprobación</div>
      <div class="flow-hdr-cell">Publicación</div>
      <div class="flow-hdr-cell">Notas</div>
    </div>
    <div id="flowRows"></div>
    <div class="add-row" onclick="openModal()">
      <i class="ti ti-plus" style="font-size:16px" aria-hidden="true"></i> Agregar publicación
    </div>
  </div>

</div>

<div class="modal-wrap" id="modalWrap">
  <div class="modal">
    <div class="modal-title">Nueva publicación</div>
    <div class="fg">
      <div class="fg-full">
        <label class="flbl">Nombre de campaña</label>
        <input class="finp" id="f-camp" placeholder="Ej. Lanzamiento Verano">
      </div>
      <div>
        <label class="flbl">Plataforma</label>
        <select class="finp" id="f-plat">
          <option>Instagram</option><option>Facebook</option><option>LinkedIn</option>
          <option>TikTok</option><option>YouTube</option><option>X / Twitter</option>
        </select>
      </div>
      <div>
        <label class="flbl">Estado</label>
        <select class="finp" id="f-stat">
          <option>Pendiente</option><option>En edición</option>
          <option>Aprobado</option><option>Publicado</option>
        </select>
      </div>
      <div>
        <label class="flbl">Fecha de entrega</label>
        <input class="finp" id="f-del" type="date">
      </div>
      <div>
        <label class="flbl">Período de edición</label>
        <input class="finp" id="f-ed" placeholder="Ej. 8–12 jul">
      </div>
      <div>
        <label class="flbl">Fecha de aprobación</label>
        <input class="finp" id="f-app" type="date">
      </div>
      <div>
        <label class="flbl">Fecha de publicación</label>
        <input class="finp" id="f-pub" type="date">
      </div>
      <div class="fg-full">
        <label class="flbl">Notas rápidas</label>
        <input class="finp" id="f-notes" placeholder="Detalles del contenido...">
      </div>
    </div>
    <div class="mact">
      <button class="btn-c" onclick="closeModal()">Cancelar</button>
      <button class="btn-s" onclick="saveEntry()">Guardar</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MON_SHORT = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const STATUS_DOT = {'Pendiente':'#B4B2A9','En edición':'#EF9F27','Aprobado':'#639922','Publicado':'#7F77DD'};
const STATUS_CLS = {'Pendiente':'s-pend','En edición':'s-edit','Aprobado':'s-apro','Publicado':'s-publ'};
const PLAT_CLS = {'Instagram':'p-ig','Facebook':'p-fb','LinkedIn':'p-li','TikTok':'p-tk','YouTube':'p-yt','X / Twitter':'p-tw'};

const today = new Date();
let curYear = today.getFullYear();
let curMonth = today.getMonth();
let activeFilter = null;
let selectedDay = null;

let entries = [
  {campaign:'Lanzamiento Verano',platform:'Instagram',delivery:'2025-07-08',editPeriod:'8–12 jul',approval:'2025-07-13',publish:'2025-07-15',notes:'Colores cálidos, carrusel',status:'En edición'},
  {campaign:'Oferta Socios',platform:'Facebook',delivery:'2025-07-10',editPeriod:'10–13 jul',approval:'2025-07-14',publish:'2025-07-16',notes:'CTA a landing page',status:'Aprobado'},
  {campaign:'Reporte Impacto Q2',platform:'LinkedIn',delivery:'2025-07-05',editPeriod:'5–8 jul',approval:'2025-07-09',publish:'2025-07-10',notes:'Versión PDF adjunta',status:'Publicado'},
  {campaign:'Reto #SaborDurazno',platform:'TikTok',delivery:'2025-07-14',editPeriod:'14–18 jul',approval:'2025-07-19',publish:'2025-07-21',notes:'Máx 30s, música trending',status:'Pendiente'},
  {campaign:'Tutorial Producto',platform:'YouTube',delivery:'2025-07-18',editPeriod:'18–22 jul',approval:'2025-07-23',publish:'2025-07-25',notes:'Subtítulos EN y ES',status:'Pendiente'},
  {campaign:'Opinión Sector IA',platform:'X / Twitter',delivery:'2025-07-12',editPeriod:'12–14 jul',approval:'2025-07-15',publish:'2025-07-16',notes:'Thread 5 tweets',status:'En edición'},
  {campaign:'Flash Sale Agosto',platform:'Instagram',delivery:'2025-08-01',editPeriod:'1–4 ago',approval:'2025-08-05',publish:'2025-08-07',notes:'Descuento 30%',status:'Pendiente'},
  {campaign:'Newsletter Mensual',platform:'LinkedIn',delivery:'2025-07-28',editPeriod:'28–30 jul',approval:'2025-07-31',publish:'2025-08-01',notes:'Resumen del mes',status:'Pendiente'}
];

function fmtDate(d) {
  if (!d) return '—';
  const p = d.split('-');
  return `${parseInt(p[2])} ${MON_SHORT[parseInt(p[1]) - 1]}`;
}

function getEntriesForDate(y, m, d) {
  const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return entries.filter(e => e.publish === ds || e.delivery === ds || e.approval === ds);
}

function renderCalendar() {
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]} ${curYear}`;
  const firstDay = new Date(curYear, curMonth, 1).getDay();
  const offset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const daysInPrev = new Date(curYear, curMonth, 0).getDate();
  let html = '';
  const total = offset + daysInMonth;
  const rows = Math.ceil(total / 7) * 7;

  for (let i = 0; i < rows; i++) {
    let day, month, year, isOther = false;
    if (i < offset) { day = daysInPrev - offset + i + 1; month = curMonth - 1; year = curYear; isOther = true; }
    else if (i >= offset + daysInMonth) { day = i - offset - daysInMonth + 1; month = curMonth + 1; year = curYear; isOther = true; }
    else { day = i - offset + 1; month = curMonth; year = curYear; }

    const isToday = day === today.getDate() && month === today.getMonth() && year === today.getFullYear();
    const isSel = selectedDay && day === selectedDay.d && month === selectedDay.m && year === selectedDay.y;
    const statuses = isOther ? [] : getEntriesForDate(year, month, day).map(e => e.status);

    let cls = 'cal-day' + (isOther ? ' other-month' : '') + (isToday ? ' today' : '') + (isSel ? ' selected' : '');
    const dayNumHtml = isToday
      ? `<div class="day-num">${day}</div>`
      : `<span class="day-num">${day}</span>`;

    let dotsHtml = '';
    if (statuses.length > 0) {
      dotsHtml = '<div class="day-dots">';
      statuses.forEach(s => { dotsHtml += `<div class="day-dot" style="background:${STATUS_DOT[s]}"></div>`; });
      dotsHtml += '</div>';
    }

    html += `<div class="${cls}" onclick="selectDay(${year},${month},${day})">${dayNumHtml}${dotsHtml}</div>`;
  }

  document.getElementById('calDays').innerHTML = html;
  updateStats();
}

function updateStats() {
  const counts = {'Pendiente':0,'En edición':0,'Aprobado':0,'Publicado':0};
  entries.forEach(e => counts[e.status]++);
  document.getElementById('sn-pend').textContent = counts['Pendiente'];
  document.getElementById('sn-edit').textContent = counts['En edición'];
  document.getElementById('sn-apro').textContent = counts['Aprobado'];
  document.getElementById('sn-publ').textContent = counts['Publicado'];
}

function selectDay(y, m, d) {
  selectedDay = {y, m, d};
  activeFilter = null;
  ['sc-pend','sc-edit','sc-apro','sc-publ'].forEach(c => document.getElementById(c).classList.remove('active'));
  const items = getEntriesForDate(y, m, d);
  showFlow(items, `${d} de ${MONTHS[m]} — publicaciones`);
  renderCalendar();
}

function toggleFilter(status, cardId) {
  const allCards = ['sc-pend','sc-edit','sc-apro','sc-publ'];
  if (activeFilter === status) {
    activeFilter = null;
    allCards.forEach(c => document.getElementById(c).classList.remove('active'));
    closePanel();
  } else {
    activeFilter = status;
    selectedDay = null;
    allCards.forEach(c => document.getElementById(c).classList.remove('active'));
    document.getElementById(cardId).classList.add('active');
    const filtered = entries.filter(e => e.status === status);
    showFlow(filtered, `Flujo: ${status}`);
    renderCalendar();
  }
}

function showFlow(items, title) {
  const panel = document.getElementById('flowPanel');
  const rowsEl = document.getElementById('flowRows');
  document.getElementById('flowPanelTitle').textContent = title;

  if (items.length === 0) {
    rowsEl.innerHTML = `<div class="empty-day"><i class="ti ti-calendar-off"></i>Sin publicaciones para esta selección</div>`;
  } else {
    rowsEl.innerHTML = items.map(e => {
      const pc = PLAT_CLS[e.platform] || 'p-ig';
      const sc = STATUS_CLS[e.status] || 's-pend';
      const dot = STATUS_DOT[e.status];
      return `<div class="flow-row">
        <div class="flow-cell">
          <span class="fc-name">${e.campaign}</span>
          <span class="plat-pill ${pc}">${e.platform}</span>
        </div>
        <div class="flow-cell">
          <div class="flow-step"><span class="step-lbl">Entrega</span><span class="step-val">${fmtDate(e.delivery)}</span></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            <span class="arr">→</span>
            <div class="flow-step"><span class="step-lbl">Edición</span><span class="step-sub">${e.editPeriod || '—'}</span></div>
          </div>
        </div>
        <div class="flow-cell">
          <div class="flow-step"><span class="step-lbl">Aprobación</span><span class="step-val">${fmtDate(e.approval)}</span></div>
        </div>
        <div class="flow-cell">
          <div class="flow-step"><span class="step-lbl">Publicación</span><span class="step-val" style="color:#3C3489">${fmtDate(e.publish)}</span></div>
          <span class="st-pill ${sc}" style="margin-top:5px">
            <span style="width:7px;height:7px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
            ${e.status}
          </span>
        </div>
        <div class="flow-cell"><span class="notes-txt">${e.notes || '—'}</span></div>
      </div>`;
    }).join('');
  }

  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closePanel() {
  document.getElementById('flowPanel').style.display = 'none';
  selectedDay = null;
  renderCalendar();
}

function openModal() { document.getElementById('modalWrap').style.display = 'flex'; }
function closeModal() { document.getElementById('modalWrap').style.display = 'none'; }

document.getElementById('modalWrap').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function saveEntry() {
  const g = id => document.getElementById(id).value.trim();
  if (!g('f-camp')) { document.getElementById('f-camp').focus(); return; }
  entries.push({
    campaign: g('f-camp'), platform: g('f-plat'),
    delivery: g('f-del'), editPeriod: g('f-ed'),
    approval: g('f-app'), publish: g('f-pub'),
    notes: g('f-notes'), status: g('f-stat')
  });
  ['f-camp','f-del','f-ed','f-app','f-pub','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-plat').selectedIndex = 0;
  document.getElementById('f-stat').selectedIndex = 0;
  closeModal();
  renderCalendar();
  if (activeFilter) {
    const map = {'Pendiente':'sc-pend','En edición':'sc-edit','Aprobado':'sc-apro','Publicado':'sc-publ'};
    toggleFilter(activeFilter, map[activeFilter]);
    toggleFilter(activeFilter, map[activeFilter]);
  }
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0) { curMonth = 11; curYear--; }
  closePanel();
  activeFilter = null;
  ['sc-pend','sc-edit','sc-apro','sc-publ'].forEach(c => document.getElementById(c).classList.remove('active'));
  renderCalendar();
}

renderCalendar();
</script>
